  /api/tasks:
    get:
      summary: 获取任务列表
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: 搜索关键词
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 50
          description: 返回数量限制
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
    post:
      summary: 创建任务
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: 任务名称（必填，最大64字符）
                  example: 完成项目开发
                description:
                  type: string
                  description: 任务描述
                  example: 完成前端和后端开发
                priority:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                  default: low
                  description: 优先级
                status:
                  type: string
                  default: in_progress
                  description: 任务状态（由系统根据负责人自动设置）
                progress:
                  type: integer
                  minimum: 0
                  maximum: 100
                  default: 0
                  description: 进度（0-100）
                dueTime:
                  type: string
                  format: date-time
                  description: 截止时间
                planStartTime:
                  type: string
                  format: date-time
                  description: 计划开始时间
                ownerUserId:
                  type: integer
                  description: 负责人ID
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  task:
                    $ref: '#/components/schemas/Task'
        '400':
          description: 参数错误
        '403':
          description: 权限不足
        '409':
          description: 任务名称重复
