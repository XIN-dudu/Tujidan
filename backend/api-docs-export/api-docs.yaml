openapi: 3.0.0
info:
  title: Tujidan API
  version: 1.0.0
  description: Tujidan 后端 API 文档 - 任务管理系统
  contact:
    name: API Support
servers:
  - url: http://localhost:3001
    description: 开发环境
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        realName:
          type: string
        phone:
          type: string
        position:
          type: string
        avatarUrl:
          type: string
    Task:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        priority:
          type: string
          enum:
            - low
            - medium
            - high
        status:
          type: string
        progress:
          type: integer
          minimum: 0
          maximum: 100
        plan_start_time:
          type: string
          format: date-time
        due_time:
          type: string
          format: date-time
        creator_user_id:
          type: string
    Log:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum:
            - work
            - study
            - life
            - other
        priority:
          type: string
          enum:
            - low
            - medium
            - high
        progress:
          type: integer
          minimum: 0
          maximum: 100
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        taskId:
          type: integer
        logStatus:
          type: string
          enum:
            - in_progress
            - completed
security:
  - bearerAuth: []
tags:
  - name: 认证相关
    description: 用户注册、登录、验证
  - name: 系统
    description: 系统健康检查
  - name: 用户管理
    description: 用户相关操作
  - name: 任务管理
    description: 任务 CRUD 操作
  - name: 日志管理
    description: 日志 CRUD 操作
  - name: 权限管理
    description: RBAC 权限管理
paths:
  /api/stats/tasks-by-department:
    get:
      summary: 按部门统计被分配任务数量
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 200
          description: 返回的最大部门数量，按任务量倒序
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        departmentId:
                          type: integer
                        taskCount:
                          type: integer
  /api/stats/keywords-by-department:
    get:
      summary: 按部门统计日志高频关键词
      tags:
        - Stats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功获取统计数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        departmentId:
                          type: integer
                        keywords:
                          type: array
                          items:
                            type: object
                            properties:
                              keyword:
                                type: string
                              count:
                                type: integer
  /api/login:
    post:
      summary: 用户登录
      tags:
        - 认证相关
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: 用户名或邮箱
                  example: testuser
                password:
                  type: string
                  description: 密码
                  example: password123
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 登录成功
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 用户名或密码错误
        '500':
          description: 服务器内部错误
  /api/notifications:
    get:
      summary: 获取当前用户的通知列表
      tags:
        - 通知管理
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功获取通知列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        type:
                          type: string
                        title:
                          type: string
                        content:
                          type: string
                        related_id:
                          type: integer
                        entity_type:
                          type: string
                        is_read:
                          type: boolean
                        created_at:
                          type: string
                          format: date-time
        '401':
          description: 未授权
        '500':
          description: 服务器错误
  /api/notifications/mark-as-read:
    post:
      summary: 将所有未读通知标记为已读
      tags:
        - 通知管理
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功将所有通知标记为已读
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  affectedRows:
                    type: integer
        '401':
          description: 未授权
        '500':
          description: 服务器错误
  /api/notifications/{id}:
    delete:
      summary: 删除一条通知
      tags:
        - 通知管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 要删除的通知的ID
      responses:
        '200':
          description: 通知删除成功
        '403':
          description: 权限不足
        '404':
          description: 通知未找到
        '500':
          description: 服务器错误
  /api/verify:
    get:
      summary: 验证 Token
      tags:
        - 认证相关
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token 有效
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Token 无效或未提供
  /api/health:
    get:
      summary: 健康检查
      tags:
        - 系统
      security: []
      responses:
        '200':
          description: 服务器运行正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 服务器运行正常
                  timestamp:
                    type: string
                    format: date-time
  /api/geocode:
    get:
      summary: 地理位置逆编码（将经纬度转换为地址）
      tags:
        - 工具
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
          description: 纬度
        - in: query
          name: lon
          required: true
          schema:
            type: number
          description: 经度
      responses:
        '200':
          description: 地址解析成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  address:
                    type: string
                    example: 北京市朝阳区建国路88号
        '400':
          description: 参数错误
        '500':
          description: 地理编码服务失败
  /api/user/avatar:
    post:
      summary: 上传头像
      tags:
        - 用户管理
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: string
                  format: binary
                  description: 图片文件（jpeg/jpg/png/gif/webp，最大5MB）
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 头像上传成功
                  avatarUrl:
                    type: string
                    example: data:image/png;base64,iVBORw0KGgo...
        '400':
          description: 未选择文件或文件格式不正确
  /api/user/profile:
    put:
      summary: 更新用户个人信息
      tags:
        - 用户管理
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: 用户名
                password:
                  type: string
                  description: 新密码（可选）
                email:
                  type: string
                  description: 邮箱
                phone:
                  type: string
                  description: 手机号
      responses:
        '200':
          description: 更新成功
        '400':
          description: 参数错误
        '409':
          description: 用户名或邮箱已被使用
  /api/logs/{id}/images:
    post:
      summary: 为日志上传图片
      tags:
        - 日志管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 日志ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - images
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 要上传的图片文件（最多 9 张，单张最大 5MB）
      responses:
        '200':
          description: 上传成功
        '400':
          description: 日志ID无效或未选择文件
        '403':
          description: 没有权限上传该日志的图片
        '404':
          description: 日志不存在
    get:
      summary: 获取日志图片列表
      tags:
        - 日志管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 日志ID
      responses:
        '200':
          description: 获取成功
        '400':
          description: 日志ID无效
        '403':
          description: 没有权限查看该日志的图片
        '404':
          description: 日志不存在
  /api/tasks/{id}/images:
    post:
      summary: 为任务上传图片
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 任务ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - images
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 要上传的图片文件（最多 9 张，单张最大 5MB）
      responses:
        '200':
          description: 上传成功
        '400':
          description: 任务ID无效或未选择文件
        '403':
          description: 没有权限上传该任务的图片
        '404':
          description: 任务不存在
    get:
      summary: 获取任务图片列表
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 任务ID
      responses:
        '200':
          description: 获取成功
        '400':
          description: 任务ID无效
        '403':
          description: 没有权限查看该任务的图片
        '404':
          description: 任务不存在
  /api/users:
    get:
      summary: 获取用户列表
      tags:
        - 用户管理
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        avatar_url:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
  /api/tasks/{id}:
    get:
      summary: 获取任务详情
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 任务ID
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Task'
        '403':
          description: 权限不足
        '404':
          description: 任务不存在
    patch:
      summary: 更新任务
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 任务ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                priority:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                status:
                  type: string
                progress:
                  type: integer
                  minimum: 0
                  maximum: 100
                dueTime:
                  type: string
                  format: date-time
                planStartTime:
                  type: string
                  format: date-time
                ownerUserId:
                  type: integer
      responses:
        '200':
          description: 更新成功
        '403':
          description: 权限不足
        '404':
          description: 任务不存在
    delete:
      summary: 删除任务
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 任务ID
      responses:
        '200':
          description: 删除成功
        '403':
          description: 权限不足
        '404':
          description: 任务不存在
  /api/users/search:
    get:
      summary: 搜索用户
      tags:
        - 用户管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: 搜索关键词（用户名或真实姓名）
          example: 张三
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        username:
                          type: string
                        real_name:
                          type: string
                        email:
                          type: string
                        avatar_url:
                          type: string
  /api/user/permissions:
    get:
      summary: 获取当前用户角色和权限
      tags:
        - 权限管理
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  roles:
                    type: array
                    items:
                      type: object
                  permissions:
                    type: array
                    items:
                      type: object
  /api/user/mbti-analysis:
    get:
      summary: 根据用户MBTI和关键词生成发展建议
      tags:
        - 用户管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: startTime
          schema:
            type: string
            format: date-time
          description: 开始时间（可选，不传则分析所有日志）
        - in: query
          name: endTime
          schema:
            type: string
            format: date-time
          description: 结束时间（可选，不传则分析所有日志）
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      suggestions:
                        type: array
                        items:
                          type: string
                      summary:
                        type: string
                      whySuitable:
                        type: string
        '400':
          description: 参数错误或关键词不足
  /api/user/development-suggestions:
    get:
      summary: 根据MBTI类型生成发展建议
      tags:
        - 用户管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: mbti
          required: true
          schema:
            type: string
          description: MBTI类型（如：INTJ）
        - in: query
          name: startTime
          schema:
            type: string
            format: date-time
          description: 开始时间（可选）
        - in: query
          name: endTime
          schema:
            type: string
            format: date-time
          description: 结束时间（可选）
      responses:
        '200':
          description: 生成成功
        '400':
          description: 参数错误
  /api/user/mbti-history:
    get:
      summary: 获取MBTI分析历史记录
      tags:
        - 用户管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: 返回的历史记录数量
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        mbtiType:
                          type: string
                        analysisData:
                          type: object
                        keywordsSummary:
                          type: string
                        createdAt:
                          type: string
  /api/top-items:
    get:
      summary: 获取公司十大重要展示项
      tags:
        - 系统
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: 返回的展示项数量，最大 10 条
      responses:
        '200':
          description: 获取成功
  /api/personal/top-items:
    get:
      summary: 获取个人十大展示项
      tags:
        - 系统
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: 返回的展示项数量，最大 10 条
      responses:
        '200':
          description: 获取成功
    post:
      summary: 新增个人展示项
      tags:
        - 系统
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  description: 展示项标题
                  example: 本周最重要的目标
                content:
                  type: string
                  description: 展示项内容（可选）
                  example: 本周完成项目接口测试与报告编写
  /api/personal/top-items/{id}:
    patch:
      summary: 更新个人展示项
      tags:
        - 系统
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 展示项ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 展示项标题
                content:
                  type: string
                  description: 展示项内容
                status:
                  type: integer
                  enum:
                    - 0
                    - 1
                  description: 状态（0=不展示, 1=展示）
                orderIndex:
                  type: integer
                  description: 排序值
    delete:
      summary: 删除个人展示项
      tags:
        - 系统
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: 展示项ID
      responses:
        '200':
          description: 删除成功
        '400':
          description: 参数无效
        '404':
          description: 记录不存在
  /api/dashboard/logs:
    get:
      summary: 获取仪表盘日志列表
      tags:
        - 日志管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 8
          description: 返回的最大日志条数
      responses:
        '200':
          description: 获取成功
    post:
      summary: 固定仪表盘日志
      tags:
        - 日志管理
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - logId
              properties:
                logId:
                  type: integer
                  description: 要固定到仪表盘的日志ID
                  example: 1
  /api/dashboard/tasks:
    get:
      summary: 获取仪表盘任务列表
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: 返回的任务数量
      responses:
        '200':
          description: 获取成功
    post:
      summary: 添加仪表盘任务
      tags:
        - 任务管理
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
