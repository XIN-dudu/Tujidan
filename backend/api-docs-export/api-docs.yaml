                type:
                  type: string
                  enum:
                    - work
                    - study
                    - life
                    - other
                  description: 日志类型
                priority:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                  default: low
                progress:
                  type: integer
                  minimum: 0
                  maximum: 100
                  default: 0
                timeFrom:
                  type: string
                  format: date-time
                  description: 开始时间
                timeTo:
                  type: string
                  format: date-time
                  description: 结束时间
                taskId:
                  type: integer
                  description: 关联任务ID
                createNewTask:
                  type: object
